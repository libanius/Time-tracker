<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TimeTrack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0a0f;--sf:#13131a;--sf2:#1c1c27;--bd:#2a2a38;--ac:#00e5a0;--ac2:#7c6bff;--ac3:#ff6b6b;--tx:#f0f0f8;--mu:#6b6b8a;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;flex-direction:column;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-tabs{display:flex;}
.nav-ver{text-align:center;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--ac2);padding:2px 0 4px;opacity:.6;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;color:var(--mu);font-size:10px;font-weight:600;cursor:pointer;}
.nb.on{color:var(--ac);}
.nb svg{width:22px;height:22px;display:block;}
.hdr{padding:20px 0 10px;display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:24px;font-weight:700;}
.hsub{font-size:12px;color:var(--mu);margin-top:2px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;}
.ct{font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--mu);text-transform:uppercase;margin-bottom:12px;}
.empty{text-align:center;padding:40px 20px;color:var(--mu);}
.ei{font-size:44px;margin-bottom:12px;}
.et{font-size:14px;line-height:1.8;}
.btn{padding:13px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn:active{opacity:.75;}
.bp{background:var(--ac);color:#0a0a0f;}
.bs{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);}
.br{background:rgba(255,107,107,.1);color:var(--ac3);border:1px solid rgba(255,107,107,.3);}
.bfull{width:100%;}
.bsm{padding:9px 14px;font-size:13px;}
.brow{display:flex;gap:8px;margin-top:12px;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}
.fg{margin-bottom:16px;}
input,select{width:100%;padding:13px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
input:focus,select:focus{border-color:var(--ac);}
input[type=time]{font-family:monospace;font-size:22px;text-align:center;letter-spacing:2px;}
input[type=date]{font-family:monospace;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);}
input[type=number]{font-family:monospace;}
input::placeholder{color:var(--mu);}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--ac);pointer-events:none;font-size:18px;font-weight:700;}
select{cursor:pointer;padding-right:36px;}
.banner{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.25);border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;}
.banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--ac2));}
.blbl{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--ac);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.bdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ac);animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.bproj{font-size:19px;font-weight:700;margin-bottom:3px;}
.bsub2{font-size:12px;color:var(--mu);}
.btime{font-size:26px;font-weight:700;color:var(--ac);font-family:monospace;margin-top:6px;}
.co-btn-quick{width:100%;margin-top:10px;padding:11px;border-radius:8px;border:1px solid rgba(255,107,107,.4);background:rgba(255,107,107,.08);color:var(--ac3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.co-btn-quick:active{opacity:.75;}

.chips{display:flex;gap:7px;flex-wrap:wrap;}

.chip:active{opacity:.7;}
.chip.on{background:var(--ac);color:#0a0a0f;border-color:var(--ac);}
.eday{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:10px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:4px;}
.erow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;}
.erow:active{background:var(--sf2);}
.erow.cin{border-left:3px solid var(--ac);}
.erow.cout{border-left:3px solid var(--ac3);}
.erow.opn{border-left:3px solid var(--ac2);background:rgba(124,107,255,.04);}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.einfo{flex:1;}
.ename{font-size:14px;font-weight:700;}
.emeta{font-size:11px;color:var(--mu);font-family:monospace;margin-top:2px;}
.etime{font-size:16px;font-weight:700;font-family:monospace;}
.ebadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.ebi{background:rgba(0,229,160,.12);color:var(--ac);}
.ebo{background:rgba(255,107,107,.12);color:var(--ac3);}
.ebop{background:rgba(124,107,255,.15);color:var(--ac2);}
.si{padding:11px 0;border-bottom:1px solid var(--bd);}
.si:last-child{border-bottom:none;}
.sirow{display:flex;justify-content:space-between;align-items:center;}
.sitm{font-size:12px;color:var(--mu);font-family:monospace;margin-top:3px;}
.sival{font-size:14px;font-weight:700;color:var(--ac);font-family:monospace;}
.sibtn{background:none;border:none;cursor:pointer;color:var(--mu);padding:4px 8px;font-size:15px;}
.pi{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--bd);}
.pi:last-child{border-bottom:none;}
.pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.pinfo{flex:1;}
.pname{font-size:15px;font-weight:700;}
.prate{font-size:12px;color:var(--mu);margin-top:3px;}
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);}
.trow:last-child{border-bottom:none;}
.tlbl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.tval{font-size:15px;font-weight:700;color:var(--ac);font-family:monospace;}
.ttm{font-size:12px;color:var(--mu);font-family:monospace;}
.gtot{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.18);border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.glbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ac);}
.gval{font-size:24px;font-weight:700;color:var(--ac);font-family:monospace;}
.gtm{font-size:12px;color:var(--mu);font-family:monospace;margin-top:2px;}
.cswrap{display:flex;gap:8px;flex-wrap:wrap;}
.csw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.csw.on{border-color:#fff;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.mtit{font-size:19px;font-weight:700;margin-bottom:18px;}
.conf{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.cbox{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:360px;}
.ctit{font-size:16px;font-weight:700;margin-bottom:10px;}
.cmsg{font-size:14px;color:var(--mu);margin-bottom:20px;line-height:1.7;}
#tc{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:380px;}
.tst{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;}
.ts{background:rgba(0,229,160,.95);color:#0a0a0f;}
.te{background:rgba(255,107,107,.95);color:#fff;}
.tw{background:rgba(255,185,60,.95);color:#0a0a0f;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--bd);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:14px;font-weight:600;}
.sdesc{font-size:12px;color:var(--mu);margin-top:3px;}
.vbanner{position:fixed;top:0;left:0;right:0;background:var(--ac2);color:#fff;text-align:center;font-size:12px;font-weight:700;padding:6px;z-index:9999;letter-spacing:1px;}
</style>
</head>
<body>
<div id="app">
  <div class="main" id="main"></div>
  <nav class="nav" id="nav"></nav>
</div>
<div id="tc"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════
   INDEXEDDB
═══════════════════════════════════════════ */
var DB;
function openDB() {
  return new Promise(function(res, rej) {
    var r = indexedDB.open('timetrack_v2', 2);
    r.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('projects'))
        d.createObjectStore('projects', {keyPath: 'id'});
      if (!d.objectStoreNames.contains('events')) {
        var s = d.createObjectStore('events', {keyPath: 'id'});
        s.createIndex('pid', 'projectId', {unique: false});
      }
      if (!d.objectStoreNames.contains('payments'))
        d.createObjectStore('payments', {keyPath: 'projectId'});
    };
    r.onsuccess = function(e) { DB = e.target.result; res(); };
    r.onerror = function(e) { rej(e.target.error); };
  });
}
function dbAll(store) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readonly');
    var r = t.objectStore(store).getAll();
    r.onsuccess = function() { res(r.result); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbPut(store, obj) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readwrite');
    var r = t.objectStore(store).put(obj);
    r.onsuccess = function() { res(r.result); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbDel(store, id) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readwrite');
    var r = t.objectStore(store).delete(id);
    r.onsuccess = function() { res(); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbAllPayments() { return dbAll('payments'); }
function setPayment(projectId, amount) {
  return dbPut('payments', {projectId: projectId, amount: amount, updatedAt: new Date().toISOString()});
}

// In-memory payments cache (loaded on reload)
var PAYMENTS = {};
function getReceived(projectId) { return PAYMENTS[projectId] || 0; }

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() :
    Date.now().toString(36) + Math.random().toString(36).substr(2);
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
var S = {tab: 'home', projects: [], events: [], timerInt: null};
var F = {type: 'checkin', projId: '', date: '', useNow: true, time: ''};
var RS = {period: 'today', df: '', dt: ''};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
var COLORS = ['#00e5a0','#7c6bff','#ff6b6b','#ffb347','#4ecdc4','#ff9ff3','#54a0ff','#ff9f43'];
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function today() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function yest() {
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function dStr(d) {
  var x = d instanceof Date ? d : new Date(d);
  return x.getFullYear() + '-' + pad(x.getMonth()+1) + '-' + pad(x.getDate());
}
function fT(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}).replace(' ', '');
}
function fD(ms) {
  if (!ms || ms <= 0) return '-';
  var t = Math.floor(ms/60000), h = Math.floor(t/60), m = t % 60;
  return h ? (m ? h+'h '+pad(m)+'m' : h+'h') : m+'m';
}
function fM(v) { return 'US$' + (+v||0).toFixed(2); }
function cV(ms, r) { return (ms && r) ? ms/3600000*r : 0; }
function fDate(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',
    {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function fDateLong(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',
    {weekday:'short', day:'2-digit', month:'short'});
}
function localeDay() {
  return new Date().toLocaleDateString('pt-BR',
    {weekday:'long', day:'2-digit', month:'long'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function projById(id) {
  return S.projects.filter(function(p) { return p.id === id; })[0] || null;
}

/* ═══════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════ */
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el('div', cls, html); }
function btn(cls, text, fn) {
  var b = el('button', cls, text);
  if (fn) b.onclick = fn;
  return b;
}
function mkLbl(txt) {
  var l = document.createElement('label');
  l.textContent = txt;
  return l;
}
function svgI(d, sty) {
  return '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"'
    + ' stroke="currentColor" stroke-width="2" stroke-linecap="round"'
    + ' stroke-linejoin="round" style="' + (sty||'') + '">'
    + '<path d="' + d + '"/></svg>';
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function toast(msg, type, dur) {
  type = type || 's'; dur = dur || 2800;
  var c = document.getElementById('tc');
  var t = document.createElement('div');
  t.className = 'tst t' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() {
    t.style.cssText = 'opacity:0;transition:opacity .3s;';
    setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 350);
  }, dur);
}

/* ═══════════════════════════════════════════
   SESSIONS (event sourcing)
═══════════════════════════════════════════ */
function buildSessions(events, projId, forDate) {
  var evs = events
    .filter(function(e) {
      return (!projId || e.projectId === projId) && dStr(e.timestampISO) === forDate;
    })
    .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
  var openMap = {}, sessions = [];
  evs.forEach(function(ev) {
    if (ev.type === 'checkin') {
      openMap[ev.projectId] = ev;
    } else if (ev.type === 'checkout' && openMap[ev.projectId]) {
      var ci = openMap[ev.projectId];
      sessions.push({
        projectId: ev.projectId,
        checkin: ci.timestampISO,
        checkout: ev.timestampISO,
        durationMs: new Date(ev.timestampISO) - new Date(ci.timestampISO),
        checkinId: ci.id,
        checkoutId: ev.id
      });
      delete openMap[ev.projectId];
    }
  });
  Object.keys(openMap).forEach(function(pid) {
    sessions.push({
      projectId: pid,
      checkin: openMap[pid].timestampISO,
      checkout: null,
      durationMs: null,
      checkinId: openMap[pid].id,
      checkoutId: null
    });
  });
  return sessions;
}

// Open sessions for TODAY only
function getOpenToday() {
  return buildSessions(S.events, null, today()).filter(function(s) { return !s.checkout; });
}

// Open sessions across ALL dates (one per project)
function getOpenAny() {
  var result = [];
  S.projects.forEach(function(proj) {
    var evs = S.events
      .filter(function(e) { return e.projectId === proj.id; })
      .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
    var stack = [];
    evs.forEach(function(ev) {
      if (ev.type === 'checkin') {
        stack.push(ev);
      } else if (ev.type === 'checkout' && stack.length) {
        stack.pop();
      }
    });
    if (stack.length) {
      var ci = stack[stack.length - 1];
      result.push({
        projectId: proj.id,
        checkin: ci.timestampISO,
        checkout: null,
        durationMs: null,
        checkinId: ci.id,
        checkoutId: null
      });
    }
  });
  return result;
}

function addEv(projId, type, tsISO) {
  return dbPut('events', {
    id: uid(),
    projectId: projId,
    type: type,
    timestampISO: tsISO,
    source: 'manual',
    createdAt: new Date().toISOString()
  });
}

/* ═══════════════════════════════════════════
   RELOAD
═══════════════════════════════════════════ */
function reload() {
  return Promise.all([dbAll('projects'), dbAll('events'), dbAll('payments')]).then(function(r) {
    S.projects = r[0].sort(function(a, b) { return a.name.localeCompare(b.name); });
    S.events = r[1];
    PAYMENTS = {};
    r[2].forEach(function(p) { PAYMENTS[p.projectId] = p.amount; });
    render();
  });
}

/* ═══════════════════════════════════════════
   CHECKIN / CHECKOUT ENGINE
═══════════════════════════════════════════ */
function doCheckin(proj, tsISO, cb) {
  var open = getOpenToday();
  if (open.some(function(s) { return s.projectId === proj.id; })) {
    toast('"' + proj.name + '" ja tem check-in aberto hoje!', 'w');
    return;
  }
  var conflict = open.filter(function(s) { return s.projectId !== proj.id; })[0];
  if (conflict) {
    var cP = projById(conflict.projectId);
    showConfirm({
      title: 'Projeto em aberto',
      msg: '"' + (cP ? cP.name : '?') + '" esta aberto. Finalizar e iniciar "' + proj.name + '"?',
      yesL: 'Trocar',
      onYes: function() {
        addEv(conflict.projectId, 'checkout', new Date().toISOString())
          .then(function() { return addEv(proj.id, 'checkin', tsISO); })
          .then(reload)
          .then(function() { toast('Check-in: ' + proj.name + ' as ' + fT(tsISO) + ' OK'); if (cb) cb(); });
      }
    });
    return;
  }
  addEv(proj.id, 'checkin', tsISO).then(reload).then(function() {
    toast('Check-in: ' + proj.name + ' as ' + fT(tsISO) + ' OK');
    if (cb) cb();
  });
}

function doCheckout(proj, tsISO, cb) {
  // Find any open checkin for this project across all dates
  var evs = S.events
    .filter(function(e) { return e.projectId === proj.id; })
    .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
  var stack = [];
  evs.forEach(function(ev) {
    if (ev.type === 'checkin') stack.push(ev);
    else if (ev.type === 'checkout' && stack.length) stack.pop();
  });
  if (!stack.length) {
    toast('Sem check-in aberto para "' + proj.name + '"!', 'e');
    return;
  }
  var lastCI = stack[stack.length - 1];
  var ciDate = dStr(new Date(lastCI.timestampISO));
  if (new Date(tsISO) <= new Date(lastCI.timestampISO)) {
    toast('Horario de saida deve ser depois do check-in (' + fT(lastCI.timestampISO) +
      (ciDate !== today() ? ' em ' + fDate(ciDate) : '') + ')', 'e', 4000);
    return;
  }
  addEv(proj.id, 'checkout', tsISO).then(reload).then(function() {
    var msg = 'Check-out: ' + proj.name + ' as ' + fT(tsISO);
    if (ciDate !== today()) msg += ' (inicio em ' + fDate(ciDate) + ')';
    toast(msg + ' OK');
    if (cb) cb();
  });
}

/* ═══════════════════════════════════════════
   MODAL / CONFIRM
═══════════════════════════════════════════ */
function showModal(fn) {
  closeModal();
  var ov = div('ov'); ov.id = 'overlay';
  var mo = div('modal');
  function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }
  fn(mo, close);
  ov.appendChild(mo);
  ov.onclick = function(e) { if (e.target === ov) close(); };
  document.body.appendChild(ov);
}

function parseVoice(raw) {
  var t = raw.toLowerCase()
    .replace(/[áàãâ]/g,'a').replace(/[éèê]/g,'e').replace(/[íì]/g,'i')
    .replace(/[óòõô]/g,'o').replace(/[úù]/g,'u').replace(/ç/g,'c').trim();
  var o = {type: null, time: null, projHint: null, projId: null};
  if (/check\s*out|checkout|finalizar|encerrar|saida/.test(t)) o.type = 'checkout';
  else if (/check\s*in|checkin|iniciar|comecar|entrada/.test(t)) o.type = 'checkin';
  if (!o.type) return o;
  var m;
  if ((m = t.match(/\b(\d{1,2})h(\d{2})\b/)) || (m = t.match(/\b(\d{1,2}):(\d{2})\b/))) {
    if (+m[1] < 24 && +m[2] < 60) { var d3 = new Date(); d3.setHours(+m[1],+m[2],0,0); o.time = d3.toISOString(); }
  } else if ((m = t.match(/\b(\d{1,2})h\b/))) {
    if (+m[1] < 24) { var d4 = new Date(); d4.setHours(+m[1],0,0,0); o.time = d4.toISOString(); }
  } else if (/\bagora\b/.test(t)) {
    o.time = new Date().toISOString();
  }
  var pm = t.match(/projeto\s+([a-z0-9 ]+?)(?:\s*$)/);
  var hint = '';
  if (pm) { hint = pm[1].trim(); }
  else {
    hint = t.replace(/check\s*out|checkout|finalizar|encerrar|saida/g,'')
      .replace(/check\s*in|checkin|iniciar|comecar|entrada/g,'')
      .replace(/\b\d{1,2}[h:]\d*\b/g,'').replace(/\bagora\b/g,'').replace(/projeto/g,'').trim();
  }
  o.projHint = hint;
  if (hint) {
    var found2 = S.projects.filter(function(p) { return p.name.toLowerCase().includes(hint); })[0];
    if (found2) o.projId = found2.id;
  }
  if (o.type === 'checkout' && !o.projId) {
    var op3 = getOpenAny();
    if (op3.length === 1) o.projId = op3[0].projectId;
  }
  return o;
}

function renderReports(main) {
  if (!RS.df) RS.df = today();
  if (!RS.dt) RS.dt = today();

  var pc = div('card'); pc.appendChild(div('ct', 'Periodo'));
  var chips2 = div('chips'); chips2.style.marginBottom = '0';
  [['today','Hoje'],['week','Semana'],['month','Mes'],['custom','Periodo']].forEach(function(item) {
    chips2.appendChild(btn('chip' + (RS.period === item[0] ? ' on' : ''), item[1],
      function() { RS.period = item[0]; render(); }));
  });
  pc.appendChild(chips2);
  if (RS.period === 'custom') {
    var dr = div(''); dr.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;';
    function mkDateFg(lbtxt, val, onch) {
      var fg = div('fg'); fg.style.marginBottom = '0'; fg.appendChild(mkLbl(lbtxt));
      var inp2 = el('input',''); inp2.type='date'; inp2.value=val;
      inp2.oninput = function() { onch(inp2.value); };
      fg.appendChild(inp2); return fg;
    }
    dr.appendChild(mkDateFg('De', RS.df, function(v) { RS.df = v; }));
    dr.appendChild(mkDateFg('Ate', RS.dt, function(v) { RS.dt = v; }));
    pc.appendChild(dr);
  }
  main.appendChild(pc);

  function getRange() {
    var d = new Date();
    if (RS.period === 'today') return {f: today(), t: today()};
    if (RS.period === 'week') {
      var dy = d.getDay(), df = dy === 0 ? 6 : dy-1;
      var mo = new Date(d); mo.setDate(d.getDate()-df);
      var su = new Date(mo); su.setDate(mo.getDate()+6);
      return {f: dStr(mo), t: dStr(su)};
    }
    if (RS.period === 'month') return {f: d.getFullYear()+'-'+pad(d.getMonth()+1)+'-01', t: today()};
    return {f: RS.df || today(), t: RS.dt || today()};
  }
  var range = getRange();
  var days2 = [], cur = new Date(range.f+'T12:00:00'), end = new Date(range.t+'T12:00:00');
  while (cur <= end) { days2.push(dStr(cur)); cur.setDate(cur.getDate()+1); }

  // Build sessions — include open ones with elapsed time
  var nowMs = Date.now();
  var allS = [];
  days2.forEach(function(d) {
    buildSessions(S.events, null, d).forEach(function(s) {
      if (s.durationMs) {
        allS.push({projectId:s.projectId, checkin:s.checkin, checkout:s.checkout,
          durationMs:s.durationMs, date:d, isOpen:false,
          checkinId:s.checkinId, checkoutId:s.checkoutId});
      } else if (!s.checkout) {
        var dur = nowMs - new Date(s.checkin).getTime();
        if (dur > 0) allS.push({projectId:s.projectId, checkin:s.checkin, checkout:null,
          durationMs:dur, date:d, isOpen:true, checkinId:s.checkinId, checkoutId:null});
      }
    });
  });

  var pts = S.projects.map(function(p) {
    var ss = allS.filter(function(s) { return s.projectId === p.id; });
    var tm = ss.reduce(function(a, s) { return a + s.durationMs; }, 0);
    return {project: p, sessions: ss, totalMs: tm, value: cV(tm, p.hourlyRateUsd)};
  }).filter(function(pt) { return pt.totalMs > 0; });
  var gt3 = pts.reduce(function(a, pt) { return a + pt.totalMs; }, 0);
  var gv3 = pts.reduce(function(a, pt) { return a + pt.value; }, 0);
  var fmtR = range.f === range.t ? fDate(range.f) : fDate(range.f) + ' - ' + fDate(range.t);

  // Export buttons — ALWAYS visible
  function genTxt() {
    var NL = '\n';
    if (!pts.length) return 'Sem dados para: ' + fmtR;
    var s = 'Relatorio ' + fmtR + NL + NL;
    pts.forEach(function(pt) {
      var received = getReceived(pt.project.id);
      var pending = pt.value - received;
      s += pt.project.name + ' - ' + fD(pt.totalMs) + ' - ' + fM(pt.value) + NL;
      pt.sessions.forEach(function(x) {
        var coTxt = x.isOpen ? 'aberto' : fT(x.checkout);
        var extra = x.isOpen ? ' *em andamento*' : '';
        s += '  ' + fDateLong(x.date) + ' ' + fT(x.checkin) + ' - ' + coTxt + ' (' + fD(x.durationMs) + ')' + extra + NL;
      });
      if (received > 0) s += '  Recebido: ' + fM(received) + ' | Pendente: ' + fM(pending) + NL;
      s += NL;
    });
    var totalReceived = pts.reduce(function(a,pt){return a+getReceived(pt.project.id);},0);
    s += 'TOTAL: ' + fD(gt3) + ' - ' + fM(gv3);

  function fbCopy(t) {

  var ec = div('card'); ec.appendChild(div('ct', 'Exportar'));

      function line(txt, sz, bold, rgb) {
        doc.setFontSize(sz); doc.setFont('helvetica', bold ? 'bold' : 'normal');

    } else {

    }

  pdfb.style.marginTop = '10px'; ec.appendChild(pdfb);
  main.appendChild(ec);

  var bk = div('card'); bk.appendChild(div('ct', 'Backup'));

        mo.appendChild(ta);
        var row = div('brow');

            .then(reload)

function shareOrDl(blob, name) {
  var url = URL.createObjectURL(blob);
  if (navigator.share) {
    var f = new File([blob], name, {type: blob.type});
    if (navigator.canShare && navigator.canShare({files:[f]})) {
      navigator.share({files:[f], title:'TimeTrack'}).catch(function() { dlLink(url, name); });
      return;
    }
  }
  dlLink(url, name);
}
function dlLink(url, name) {
  var a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  toast('Download iniciado');
}

    '<b style="color:var(--tx)">TimeTrack v7.1</b><br>' +
    '100% local e offline.<br>' +
    'Dados armazenados no seu iPhone.<br><br>' +
    '<span style="font-family:monospace;font-size:11px">IndexedDB · Offline-first</span></div>'
  ));
}

function openProjectForm(proj) {
  showModal(function(mo, close) {
    mo.appendChild(div('mtit', proj ? 'Editar Projeto' : 'Novo Projeto'));
    function mkfg(lbtxt) { var f = div('fg'); f.appendChild(mkLbl(lbtxt)); return f; }
    var f1 = mkfg('Nome'); var ni = el('input',''); ni.type='text'; ni.placeholder='ex: Greg, Lia...';
    if (proj) ni.value = proj.name; f1.appendChild(ni); mo.appendChild(f1);
    var f2 = mkfg('Taxa US$/hora'); var ri = el('input',''); ri.type='number'; ri.placeholder='35.00'; ri.step='0.01'; ri.min='0';
    if (proj) ri.value = proj.hourlyRateUsd; f2.appendChild(ri); mo.appendChild(f2);
    var f3 = mkfg('Categoria (opcional)'); var ci = el('input',''); ci.type='text'; ci.placeholder='freelance, cliente...';
    if (proj) ci.value = proj.category || ''; f3.appendChild(ci); mo.appendChild(f3);
    var f4 = mkfg('Cor'); var cw = div('cswrap');
    var selC = proj ? (proj.color || COLORS[0]) : COLORS[S.projects.length % COLORS.length];
    COLORS.forEach(function(c) {
      var sw = div('csw' + (c === selC ? ' on' : '')); sw.style.background = c;
      sw.onclick = function() {
        selC = c;
        cw.querySelectorAll('.csw').forEach(function(x) { x.className = 'csw'; });
        sw.className = 'csw on';
      };
      cw.appendChild(sw);
    });
    f4.appendChild(cw); mo.appendChild(f4);
    var row4 = div('brow');
    var cb3 = btn('btn bs', 'Cancelar', close); cb3.style.flex = '1';
    var sb = btn('btn bp', 'Salvar', function() {
      var nm = ni.value.trim(); if (!nm) { toast('Nome obrigatorio', 'w'); return; }
      var rt = parseFloat(ri.value); if (!rt || rt <= 0) { toast('Taxa invalida', 'w'); return; }
      var now2 = new Date().toISOString();
      dbPut('projects', {
        id: proj ? proj.id : uid(), name: nm, hourlyRateUsd: rt, color: selC,
        category: ci.value.trim(), createdAt: proj ? proj.createdAt : now2, updatedAt: now2
      }).then(reload).then(function() { close(); toast(proj ? 'Projeto atualizado' : 'Projeto "' + nm + '" criado'); });
    }); sb.style.flex = '1';
    row4.appendChild(cb3); row4.appendChild(sb); mo.appendChild(row4);
    setTimeout(function() { ni.focus(); }, 200);
  });
}

});
