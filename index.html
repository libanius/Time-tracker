<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

.ob-body{flex:1;}

.lz-section{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:10px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:4px;}

<body>
<div id="app">
  <div class="main" id="main"></div>
  <nav class="nav" id="nav"></nav>
</div>
<div id="tc"></div>
<script>
'use strict';

/* =================================
   INDEXEDDB
================================= */
var DB;
function openDB() {
  return new Promise(function(res, rej) {
    var r = indexedDB.open('timetrack_v2', 2);
    r.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('projects'))
        d.createObjectStore('projects', {keyPath: 'id'});
      if (!d.objectStoreNames.contains('events')) {
        var s = d.createObjectStore('events', {keyPath: 'id'});
        s.createIndex('pid', 'projectId', {unique: false});
      }
      if (!d.objectStoreNames.contains('payments'))
        d.createObjectStore('payments', {keyPath: 'projectId'});
    };
    r.onsuccess = function(e) { DB = e.target.result; res(); };
    r.onerror = function(e) { rej(e.target.error); };
  });
}
function dbAll(store) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readonly');
    var r = t.objectStore(store).getAll();
    r.onsuccess = function() { res(r.result); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbPut(store, obj) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readwrite');
    var r = t.objectStore(store).put(obj);
    r.onsuccess = function() { res(r.result); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbDel(store, id) {
  return new Promise(function(res, rej) {
    var t = DB.transaction(store, 'readwrite');
    var r = t.objectStore(store).delete(id);
    r.onsuccess = function() { res(); };
    r.onerror = function() { rej(r.error); };
  });
}
function dbAllPayments() { return dbAll('payments'); }
function setPayment(projectId, amount) {
  return dbPut('payments', {projectId: projectId, amount: amount, updatedAt: new Date().toISOString()});
}

// In-memory payments cache (loaded on reload)
var PAYMENTS = {};
function getReceived(projectId) { return PAYMENTS[projectId] || 0; }

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() :
    Date.now().toString(36) + Math.random().toString(36).substr(2);
}

/* =================================
   STATE
================================= */
var S = {tab: 'home', projects: [], events: [], timerInt: null};
var GH = {token: '', repo: '', path: 'timetrack-backup.json'};
var F = {type: 'checkin', projId: '', date: '', useNow: true, time: ''};
var RS = {period: 'today', df: '', dt: '', projId: ''};

/* =================================
   UTILS
================================= */
var COLORS = ['#00e5a0','#7c6bff','#ff6b6b','#ffb347','#4ecdc4','#ff9ff3','#54a0ff','#ff9f43'];
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function today() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function yest() {
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function dStr(d) {
  var x = d instanceof Date ? d : new Date(d);
  return x.getFullYear() + '-' + pad(x.getMonth()+1) + '-' + pad(x.getDate());
}
function fT(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}).replace(' ', '');
}
function fD(ms) {
  if (!ms || ms <= 0) return '-';
  var t = Math.floor(ms/60000), h = Math.floor(t/60), m = t % 60;
  return h ? (m ? h+'h '+pad(m)+'m' : h+'h') : m+'m';
}
function fM(v) { return 'US$' + (+v||0).toFixed(2); }
function cV(ms, r) { return (ms && r) ? ms/3600000*r : 0; }
function fDate(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',
    {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function fDateLong(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('pt-BR',
    {weekday:'short', day:'2-digit', month:'short'});
}
function localeDay() {
  return new Date().toLocaleDateString('pt-BR',
    {weekday:'long', day:'2-digit', month:'long'});
}
function esc(s) {
  var r=String(s||'');
  r=r.split('&').join('&amp;');
  r=r.split('<').join('&lt;');
  r=r.split('>').join('&gt;');
  r=r.split('"').join('&quot;');
  return r;
}
function projById(id) {
  return S.projects.filter(function(p) { return p.id === id; })[0] || null;
}

/* =================================
   DOM HELPERS
================================= */
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el('div', cls, html); }
function btn(cls, text, fn) {
  var b = el('button', cls, text);
  if (fn) b.onclick = fn;
  return b;
}
function mkLbl(txt) {
  var l = document.createElement('label');
  l.textContent = txt;
  return l;
}
function svgI(d, sty) {
  return '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"'
    + ' stroke="currentColor" stroke-width="2" stroke-linecap="round"'
    + ' stroke-linejoin="round" style="' + (sty||'') + '">'
    + '<path d="' + d + '"/></svg>';
}

/* =================================
   TOAST
================================= */
function toast(msg, type, dur) {
  type = type || 's'; dur = dur || 2800;
  var c = document.getElementById('tc');
  var t = document.createElement('div');
  t.className = 'tst t' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() {
    t.style.cssText = 'opacity:0;transition:opacity .3s;';
    setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 350);
  }, dur);
}

/* =================================
   SESSIONS (event sourcing)
================================= */
function buildSessions(events, projId, forDate) {
  var evs = events
    .filter(function(e) {
      return (!projId || e.projectId === projId) && dStr(e.timestampISO) === forDate;
    })
    .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
  var openMap = {}, sessions = [];
  evs.forEach(function(ev) {
    if (ev.type === 'checkin') {
      openMap[ev.projectId] = ev;
    } else if (ev.type === 'checkout' && openMap[ev.projectId]) {
      var ci = openMap[ev.projectId];
      sessions.push({
        projectId: ev.projectId,
        checkin: ci.timestampISO,
        checkout: ev.timestampISO,
        durationMs: new Date(ev.timestampISO) - new Date(ci.timestampISO),
        checkinId: ci.id,
        checkoutId: ev.id
      });
      delete openMap[ev.projectId];
    }
  });
  Object.keys(openMap).forEach(function(pid) {
    sessions.push({
      projectId: pid,
      checkin: openMap[pid].timestampISO,
      checkout: null,
      durationMs: null,
      checkinId: openMap[pid].id,
      checkoutId: null
    });
  });
  return sessions;
}

// Open sessions for TODAY only
function getOpenToday() {
  return buildSessions(S.events, null, today()).filter(function(s) { return !s.checkout; });
}

// Open sessions across ALL dates (one per project)
function getOpenAny() {
  var result = [];
  S.projects.forEach(function(proj) {
    var evs = S.events
      .filter(function(e) { return e.projectId === proj.id; })
      .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
    var stack = [];
    evs.forEach(function(ev) {
      if (ev.type === 'checkin') {
        stack.push(ev);
      } else if (ev.type === 'checkout' && stack.length) {
        stack.pop();
      }
    });
    if (stack.length) {
      var ci = stack[stack.length - 1];
      result.push({
        projectId: proj.id,
        checkin: ci.timestampISO,
        checkout: null,
        durationMs: null,
        checkinId: ci.id,
        checkoutId: null
      });
    }
  });
  return result;
}

function addEv(projId, type, tsISO) {
  return dbPut('events', {
    id: uid(),
    projectId: projId,
    type: type,
    timestampISO: tsISO,
    source: 'manual',
    createdAt: new Date().toISOString()
  });
}

/* =================================
   RELOAD
================================= */
function reload() {
  return Promise.all([dbAll('projects'), dbAll('events'), dbAll('payments')]).then(function(r) {
    S.projects = r[0].sort(function(a, b) { return a.name.localeCompare(b.name); });
    S.events = r[1];
    PAYMENTS = {};
    r[2].forEach(function(p) { PAYMENTS[p.projectId] = p.amount; });
    render();
  });
}

/* =================================
   CHECKIN / CHECKOUT ENGINE
================================= */
function doCheckin(proj, tsISO, cb) {
  var open = getOpenToday();
  if (open.some(function(s) { return s.projectId === proj.id; })) {
    toast('"' + proj.name + '" ja tem check-in aberto hoje!', 'w');
    return;
  }
  var conflict = open.filter(function(s) { return s.projectId !== proj.id; })[0];
  if (conflict) {
    var cP = projById(conflict.projectId);
    showConfirm({
      title: 'Projeto em aberto',
      msg: '"' + (cP ? cP.name : '?') + '" esta aberto. Finalizar e iniciar "' + proj.name + '"?',
      yesL: 'Trocar',
      onYes: function() {
        addEv(conflict.projectId, 'checkout', new Date().toISOString())
          .then(function() { return addEv(proj.id, 'checkin', tsISO); })
          .then(reload)
          .then(function() { toast('Check-in: ' + proj.name + ' as ' + fT(tsISO) + ' OK'); if (cb) cb(); });
      }
    });
    return;
  }
  addEv(proj.id, 'checkin', tsISO).then(reload).then(function() {
    toast('Check-in: ' + proj.name + ' as ' + fT(tsISO) + ' OK');
    if (cb) cb();
  });
}

function doCheckout(proj, tsISO, cb) {
  // Find any open checkin for this project across all dates
  var evs = S.events
    .filter(function(e) { return e.projectId === proj.id; })
    .sort(function(a, b) { return new Date(a.timestampISO) - new Date(b.timestampISO); });
  var stack = [];
  evs.forEach(function(ev) {
    if (ev.type === 'checkin') stack.push(ev);
    else if (ev.type === 'checkout' && stack.length) stack.pop();
  });
  if (!stack.length) {
    toast('Sem check-in aberto para "' + proj.name + '"!', 'e');
    return;
  }
  var lastCI = stack[stack.length - 1];
  var ciDate = dStr(new Date(lastCI.timestampISO));
  if (new Date(tsISO) <= new Date(lastCI.timestampISO)) {
    toast('Horario de saida deve ser depois do check-in (' + fT(lastCI.timestampISO) +
      (ciDate !== today() ? ' em ' + fDate(ciDate) : '') + ')', 'e', 4000);
    return;
  }
  addEv(proj.id, 'checkout', tsISO).then(reload).then(function() {
    var msg = 'Check-out: ' + proj.name + ' as ' + fT(tsISO);
    if (ciDate !== today()) msg += ' (inicio em ' + fDate(ciDate) + ')';
    toast(msg + ' OK');
    if (cb) cb();
  });
}

function parseVoice(raw) {
  var t = raw.toLowerCase()
    .replace(/[\u00E1\u00E0\u00E3\u00E2]/g,'a').replace(/[\u00E9\u00E8\u00EA]/g,'e').replace(/[\u00ED\u00EC]/g,'i')
    .replace(/[\u00F3\u00F2\u00F5\u00F4]/g,'o').replace(/[\u00FA\u00F9]/g,'u').replace(/\u00E7/g,'c').trim();
  var o = {type: null, time: null, projHint: null, projId: null};
  if (/check\s*out|checkout|finalizar|encerrar|saida/.test(t)) o.type = 'checkout';
  else if (/check\s*in|checkin|iniciar|comecar|entrada/.test(t)) o.type = 'checkin';
  if (!o.type) return o;
  var m;
  if ((m = t.match(/\b(\d{1,2})h(\d{2})\b/)) || (m = t.match(/\b(\d{1,2}):(\d{2})\b/))) {
    if (+m[1] < 24 && +m[2] < 60) { var d3 = new Date(); d3.setHours(+m[1],+m[2],0,0); o.time = d3.toISOString(); }
  } else if ((m = t.match(/\b(\d{1,2})h\b/))) {
    if (+m[1] < 24) { var d4 = new Date(); d4.setHours(+m[1],0,0,0); o.time = d4.toISOString(); }
  } else if (/\bagora\b/.test(t)) {
    o.time = new Date().toISOString();
  }
  var pm = t.match(/projeto\s+([a-z0-9 ]+?)(?:\s*$)/);
  var hint = '';
  if (pm) { hint = pm[1].trim(); }
  else {
    hint = t.replace(/check\s*out|checkout|finalizar|encerrar|saida/g,'')
      .replace(/check\s*in|checkin|iniciar|comecar|entrada/g,'')
      .replace(/\b\d{1,2}[h:]\d*\b/g,'').replace(/\bagora\b/g,'').replace(/projeto/g,'').trim();
  }
  o.projHint = hint;
  if (hint) {
    var found2 = S.projects.filter(function(p) { return p.name.toLowerCase().includes(hint); })[0];
    if (found2) o.projId = found2.id;
  }
  if (o.type === 'checkout' && !o.projId) {
    var op3 = getOpenAny();
    if (op3.length === 1) o.projId = op3[0].projectId;
  }
  return o;
}

      msg2.innerHTML = '<span style="font-size:13px;color:var(--mu)">Nenhum projeto cadastrado</span>';

      if (p.id === F.projId) o.selected = true;
      sel2.appendChild(o);
    });

    sel2.onchange = function() { F.projId = sel2.value; };
    wrap2.appendChild(sel2); projWrap.appendChild(wrap2);
    psel = sel2;
  }

  // Data

  var dateRow = div(''); dateRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;';
  var isOth = F.date !== today() && F.date !== yestStr;
  var btd = btn('btn bsm ' + (F.date === today() ? 'bp' : 'bs'), 'Hoje', null);
  var byt = btn('btn bsm ' + (F.date === yestStr ? 'bp' : 'bs'), 'Ontem', null);
  var bot = btn('btn bsm ' + (isOth ? 'bp' : 'bs'), 'Outro dia', null);
  var dIW = div(''); dIW.style.display = isOth ? '' : 'none';
  var dInp = el('input', ''); dInp.type = 'date'; dInp.value = F.date; dInp.max = today();
  dInp.oninput = function() { F.date = dInp.value; applyDate(F.date); };
  dIW.appendChild(dInp);
  function applyDate(val) {
    F.date = val || today();
    var isO = F.date !== today() && F.date !== yestStr;
    btd.className = 'btn bsm ' + (F.date === today() ? 'bp' : 'bs');
    byt.className = 'btn bsm ' + (F.date === yestStr ? 'bp' : 'bs');
    bot.className = 'btn bsm ' + (isO ? 'bp' : 'bs');
    dIW.style.display = isO ? '' : 'none';
    if (F.date !== today()) { F.useNow = false; applyTimeUI(); }
    rebuildHourChips();
  }
  btd.onclick = function() { applyDate(today()); };
  byt.onclick = function() { applyDate(yestStr); };
  bot.onclick = function() {
    dIW.style.display = '';
    bot.className = 'btn bsm bp'; btd.className = 'btn bsm bs'; byt.className = 'btn bsm bs';
    F.date = dInp.value || yestStr; F.useNow = false; applyTimeUI(); rebuildHourChips();
    setTimeout(function() { dInp.focus(); }, 80);
  };
  dateRow.appendChild(btd); dateRow.appendChild(byt); dateRow.appendChild(bot);
  fg3.appendChild(dateRow); fg3.appendChild(dIW); card.appendChild(fg3);

  // Horario
  var fg2 = div('fg'); fg2.appendChild(mkLbl('Horario'));
  if (F.date !== today()) F.useNow = false;
  var tBR = div(''); tBR.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
  var bnow = btn('btn bsm ' + (F.useNow ? 'bp' : 'bs'), 'Agora', null);
  var bcus = btn('btn bsm ' + (F.useNow ? 'bs' : 'bp'), 'Digitar', null);
  var tIW = div(''); tIW.style.display = F.useNow ? 'none' : '';
  var tInp = el('input', ''); tInp.type = 'time'; tInp.value = F.time || '';
  tInp.oninput = function() { F.time = tInp.value; };
  var qhRow = div('chips'); qhRow.style.marginTop = '8px';
  function rebuildHourChips() {
    qhRow.innerHTML = '';
    for (var off = -6; off <= 0; off++) {
      (function(o) {
        var d5 = new Date(Date.now() + o*3600000);
        if (dStr(d5) !== F.date) return;
        var hv = pad(d5.getHours()) + ':' + pad(d5.getMinutes());
        var hl = pad(d5.getHours()) + 'h' + (d5.getMinutes() ? pad(d5.getMinutes()) : '');
        var c = btn('chip', hl, function() {
          tInp.value = hv; F.time = hv; F.useNow = false;
          bnow.className = 'btn bsm bs'; bcus.className = 'btn bsm bp'; tIW.style.display = '';
        });
        c.style.fontFamily = 'monospace'; qhRow.appendChild(c);
      })(off);
    }
  }
  rebuildHourChips();
  tIW.appendChild(tInp); tIW.appendChild(qhRow);
  function applyTimeUI() {
    var it = F.date === today();
    bnow.className = 'btn bsm ' + (F.useNow && it ? 'bp' : 'bs');
    bcus.className = 'btn bsm ' + (F.useNow && it ? 'bs' : 'bp');
    tIW.style.display = (F.useNow && it) ? 'none' : '';
  }
  bnow.onclick = function() {
    if (F.date !== today()) { toast('Para datas passadas, informe o horario', 'w'); return; }
    F.useNow = true; applyTimeUI();
  };
  bcus.onclick = function() { F.useNow = false; applyTimeUI(); setTimeout(function() { tInp.focus(); }, 80); };
  tBR.appendChild(bnow); tBR.appendChild(bcus);
  fg2.appendChild(tBR); fg2.appendChild(tIW); card.appendChild(fg2);

  // Registrar button
  var regBtn = btn('btn bp bfull', 'Registrar', function() {
    if (!psel) { toast('Crie um projeto primeiro em Ajustes', 'w'); return; }
    var proj = projById(psel.value);
    if (!proj) { toast('Selecione um projeto', 'w'); return; }
    F.projId = psel.value;
    var chosenDate = F.date || today();
    var tsISO;
    if (F.useNow && chosenDate === today()) {
      tsISO = new Date().toISOString();
    } else {
      if (!F.time) { toast('Informe o horario', 'w'); setTimeout(function() { tInp.focus(); }, 80); return; }
      var parts = F.time.split(':');
      var dd2 = new Date(chosenDate + 'T00:00:00');
      dd2.setHours(+parts[0], +parts[1], 0, 0); tsISO = dd2.toISOString();
    }
    if (new Date(tsISO) > new Date()) { toast('Horario no futuro', 'w'); return; }
    var forDate = dStr(new Date(tsISO));
    var isToday2 = forDate === today();
    function clr() {
      F.time = ''; F.useNow = true; F.date = today();
      F.projId = S.projects.length ? S.projects[0].id : '';
    }
    if (F.type === 'checkin') {
      if (isToday2) doCheckin(proj, tsISO, clr);
      else addEv(proj.id, 'checkin', tsISO).then(reload).then(function() {
        toast('Check-in: ' + proj.name + ' em ' + fDate(forDate) + ' as ' + fT(tsISO) + ' OK'); clr();
      });
    } else {
      doCheckout(proj, tsISO, clr);
    }
  });
  regBtn.style.marginTop = '4px'; card.appendChild(regBtn);
  main.appendChild(card);
}

function renderReports(main) {
  if (!RS.df) RS.df = today();
  if (!RS.dt) RS.dt = today();
  var hdr = div('hdr'); hdr.appendChild(el('h1', null, 'Relatorios')); main.appendChild(hdr);

  var pc = div('card'); pc.appendChild(div('ct', 'Periodo'));
  var chips2 = div('chips'); chips2.style.marginBottom = '0';
  [['today','Hoje'],['week','Semana'],['month','Mes'],['custom','Periodo'],['project','Projeto']].forEach(function(item) {
    chips2.appendChild(btn('chip' + (RS.period === item[0] ? ' on' : ''), item[1],
      function() { RS.period = item[0]; render(); }));
  });
  pc.appendChild(chips2);
  if (RS.period === 'custom') {
    var dr = div(''); dr.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;';
    function mkDateFg(lbtxt, val, onch) {
      var fg = div('fg'); fg.style.marginBottom = '0'; fg.appendChild(mkLbl(lbtxt));
      var inp2 = el('input',''); inp2.type='date'; inp2.value=val;
      inp2.oninput = function() { onch(inp2.value); };
      fg.appendChild(inp2); return fg;
    }
    dr.appendChild(mkDateFg('De', RS.df, function(v) { RS.df = v; }));
    dr.appendChild(mkDateFg('Ate', RS.dt, function(v) { RS.dt = v; }));
    pc.appendChild(dr);
  }
  if (RS.period === 'project') {
    var psel2 = div('sel-wrap'); psel2.style.marginTop = '12px';
    var pselI = document.createElement('select');
    S.projects.forEach(function(p) {
      var o = document.createElement('option');
      o.value = p.id;
      o.textContent = p.name + ' - ' + fM(p.hourlyRateUsd) + '/h';
      if (p.id === RS.projId) o.selected = true;
      pselI.appendChild(o);
    });
    if (!RS.projId && S.projects.length) RS.projId = S.projects[0].id;
    pselI.value = RS.projId || '';
    pselI.onchange = function() { RS.projId = pselI.value; render(); };
    psel2.appendChild(pselI); pc.appendChild(psel2);
  }
  main.appendChild(pc);

  function getRange() {
    var d = new Date();
    if (RS.period === 'today') return {f: today(), t: today()};
    if (RS.period === 'week') {
      // Payroll week: Saturday\u2192Friday
      var dy = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
      var daysFromSat = (dy + 1) % 7; // days since last Saturday
      var sat = new Date(d); sat.setDate(d.getDate() - daysFromSat);
      var fri = new Date(sat); fri.setDate(sat.getDate() + 6);
      return {f: dStr(sat), t: dStr(fri)};
    }
    if (RS.period === 'month') return {f: d.getFullYear()+'-'+pad(d.getMonth()+1)+'-01', t: today()};
    if (RS.period === 'project') return {f: '2000-01-01', t: today()}; // all time for project view
    return {f: RS.df || today(), t: RS.dt || today()};
  }
  var range = getRange();
  var days2 = [], cur = new Date(range.f+'T12:00:00'), end = new Date(range.t+'T12:00:00');
  while (cur <= end) { days2.push(dStr(cur)); cur.setDate(cur.getDate()+1); }

  // Build sessions - include open ones with elapsed time
  var nowMs = Date.now();
  var allS = [];
  days2.forEach(function(d) {
    buildSessions(S.events, null, d).forEach(function(s) {
      if (s.durationMs) {
        allS.push({projectId:s.projectId, checkin:s.checkin, checkout:s.checkout,
          durationMs:s.durationMs, date:d, isOpen:false,
          checkinId:s.checkinId, checkoutId:s.checkoutId});
      } else if (!s.checkout) {
        var dur = nowMs - new Date(s.checkin).getTime();
        if (dur > 0) allS.push({projectId:s.projectId, checkin:s.checkin, checkout:null,
          durationMs:dur, date:d, isOpen:true, checkinId:s.checkinId, checkoutId:null});
      }
    });
  });

  // Filter by project if in project mode
  var filterProjId = RS.period === 'project' ? (RS.projId || '') : null;

  var pts = S.projects
    .filter(function(p) { return !filterProjId || p.id === filterProjId; })
    .map(function(p) {
      var ss = allS.filter(function(s) { return s.projectId === p.id; });
      var tm = ss.reduce(function(a, s) { return a + s.durationMs; }, 0);
      return {project: p, sessions: ss, totalMs: tm, value: cV(tm, p.hourlyRateUsd)};
    }).filter(function(pt) { return pt.totalMs > 0; });
  var gt3 = pts.reduce(function(a, pt) { return a + pt.totalMs; }, 0);
  var gv3 = pts.reduce(function(a, pt) { return a + pt.value; }, 0);
  var fmtR = RS.period === 'project'
    ? (filterProjId ? (projById(filterProjId)||{name:'?'}).name + ' - Hist\u00F3rico completo' : 'Projeto')
    : (range.f === range.t ? fDate(range.f) : fDate(range.f) + ' - ' + fDate(range.t));

  // Export buttons - ALWAYS visible
  function genTxt() {
    var NL = '\n';
    if (!pts.length) return 'Sem dados para: ' + fmtR;
    var s = 'Relatorio ' + fmtR + NL + NL;
    pts.forEach(function(pt) {
      s += pt.project.name + ' - ' + fD(pt.totalMs) + ' - ' + fM(pt.value) + NL;
      pt.sessions.forEach(function(x) {
        var coTxt = x.isOpen ? 'aberto' : fT(x.checkout);
        var extra = x.isOpen ? ' *em andamento*' : '';
        s += '  ' + fDateLong(x.date) + ' ' + fT(x.checkin) + ' - ' + coTxt + ' (' + fD(x.durationMs) + ')' + extra + NL;
      });
      s += NL;
    });
    var totalPaidAll = pts.reduce(function(a,pt){ return a+getReceived('proj_'+pt.project.id); }, 0);
    s += 'TOTAL: ' + fD(gt3) + ' - ' + fM(gv3);
    if (totalPaidAll > 0) s += NL + 'Pago: ' + fM(totalPaidAll) + ' | Pendente: ' + fM(gv3 - totalPaidAll);
    return s;
  }
  function fbCopy(t) {
    var ta = document.createElement('textarea'); ta.value = t;
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Copiado!'); }
    catch(e) { toast('Erro ao copiar', 'e'); }
    document.body.removeChild(ta);
  }

  var ec = div('card'); ec.appendChild(div('ct', 'Exportar'));
  var cpb = btn('btn bs bfull', 'Copiar para WhatsApp', function() {
    var txt = genTxt();
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(function() { toast('Copiado!'); }).catch(function() { fbCopy(txt); });
    else fbCopy(txt);
  });
  ec.appendChild(cpb);
  var pdfb = btn('btn bp bfull', 'Exportar PDF', function() {
    if (!pts.length) { toast('Sem dados para exportar', 'w'); return; }
    if (window.jspdf && window.jspdf.jsPDF) {
      var doc = new window.jspdf.jsPDF({unit:'mm', format:'a4'});
      var y = 20;
      function line(txt, sz, bold, rgb) {
        doc.setFontSize(sz); doc.setFont('helvetica', bold ? 'bold' : 'normal');
        if (rgb) doc.setTextColor(rgb[0],rgb[1],rgb[2]); else doc.setTextColor(0);
        if (y > 275) { doc.addPage(); y = 20; }
        doc.text(txt, 15, y); y += sz*0.45+2;
      }
      line('TimeTrack - Relatorio', 18, true);
      line(fmtR, 11, false, [100,100,100]); y += 2;
      doc.setDrawColor(200); doc.line(15,y,195,y); y += 5;
      pts.forEach(function(pt) {
        line(pt.project.name, 13, true);
        line(fD(pt.totalMs) + '   ' + fM(pt.value) + '   ' + fM(pt.project.hourlyRateUsd) + '/h', 10, false, [80,80,80]);
        pt.sessions.forEach(function(s) {
          var coTxt2 = s.isOpen ? 'aberto' : fT(s.checkout);
          line('    ' + fDateLong(s.date) + '  ' + fT(s.checkin) + '-' + coTxt2 +
            '  ' + fD(s.durationMs) + '  ' + fM(cV(s.durationMs, pt.project.hourlyRateUsd)),
            10, false, [110,110,110]);
        });
        y += 2;
      });
      line('TOTAL: ' + fD(gt3) + ' - ' + fM(gv3), 13, true);
      shareOrDl(doc.output('blob'), 'relatorio.pdf');
    } else {
      shareOrDl(new Blob([genTxt()], {type:'text/plain'}), 'relatorio.txt');
      toast('PDF nao disponivel - exportando texto', 'w');
    }
  });
  pdfb.style.marginTop = '10px'; ec.appendChild(pdfb);
  main.appendChild(ec);

  var bk = div('card'); bk.appendChild(div('ct', 'Backup'));
  var bkrow = div('brow');
  var expj = btn('btn bs', 'Exportar JSON', function() {
    Promise.all([dbAll('projects'), dbAll('events')]).then(function(r) {
      var json = JSON.stringify({projects:r[0],events:r[1],v:2,at:new Date().toISOString()},null,2);
      showModal(function(mo, close) {
        mo.appendChild(div('mtit', 'Exportar JSON'));
        mo.appendChild(div('', '<div style="font-size:13px;color:var(--mu);margin-bottom:12px">'
          + r[0].length + ' projetos \u00B7 ' + (r[1].length/2|0) + ' sessoes</div>'));
        var ta = document.createElement('textarea');
        ta.value = json;
        ta.readOnly = true;
        ta.style.cssText = 'width:100%;height:180px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:11px;font-family:monospace;padding:12px;outline:none;resize:none;-webkit-appearance:none;';
        mo.appendChild(ta);
        var row = div('brow');
        var cl2 = btn('btn bs', 'Fechar', close); cl2.style.flex = '1';
        var cpb = btn('btn bs', 'Copiar', function() {
          ta.select();
          if (navigator.clipboard) {
            navigator.clipboard.writeText(json).then(function() { toast('JSON copiado!'); })
              .catch(function() { fallback(); });
          } else { fallback(); }
          function fallback() {
            try { document.execCommand('copy'); toast('JSON copiado!'); }
            catch(e) { toast('Selecione e copie manualmente', 'w', 4000); }
          }
        }); cpb.style.flex = '1';
        var dlb = btn('btn bp', 'Download', function() {
          shareOrDl(new Blob([json],{type:'application/json'}), 'timetrack-backup.json');
        }); dlb.style.flex = '1';
        row.appendChild(cl2); row.appendChild(cpb); row.appendChild(dlb); mo.appendChild(row);
        setTimeout(function() { ta.select(); }, 200);
      });
    });
  }); expj.style.flex = '1';
  var impj = btn('btn bs', 'Importar JSON', function() {
    showModal(function(mo, close) {
      mo.appendChild(div('mtit', 'Importar JSON'));

function shareOrDl(blob, name) {
  var url = URL.createObjectURL(blob);
  if (navigator.share) {
    var f = new File([blob], name, {type: blob.type});
    if (navigator.canShare && navigator.canShare({files:[f]})) {
      navigator.share({files:[f], title:'TimeTrack'}).catch(function() { dlLink(url, name); });
      return;
    }
  }
  dlLink(url, name);
}
function dlLink(url, name) {
  var a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  toast('Download iniciado');
}

function renderLedger(main) {
  var hdr = div('hdr');

  main.appendChild(hdr);

  // Load all ledger entries from payments store (key prefix 'lz_')
  // Ledger entry: {id, date, description, project, type:'in'|'out', amount, note}
  // We store them as payments with key 'lz_<id>'

  var LZ_KEY = '__ledger__';
  var entries = [];
  try {
    var raw = localStorage.getItem(LZ_KEY);
    entries = raw ? JSON.parse(raw) : [];
  } catch(e) { entries = []; }

  function saveEntries() {
    try { localStorage.setItem(LZ_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function addEntry(entry) {
    entry.id = uid();
    entry.createdAt = new Date().toISOString();
    entries.push(entry);
    entries.sort(function(a,b){ return a.date.localeCompare(b.date); });
    saveEntries();
    renderLedger(main);
    main.scrollTop = 0;
  }

  function deleteEntry(id) {
    entries = entries.filter(function(e){ return e.id !== id; });
    saveEntries();
    renderLedger(main);
  }

    '</div>' +
    '<div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(0,229,160,.2);">' +
      '<div style="font-size:14px;font-weight:700;color:var(--tx)">Saldo</div>' +
      '<div style="font-size:22px;font-weight:700;font-family:monospace;color:' + (bal>=0?'var(--ac)':'var(--ac3)') + '">' + (bal>=0?'+':'') + fM(bal) + '</div>' +
    '</div>';
  main.appendChild(balCard);

  // \u2500\u2500 Copy to WhatsApp \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var copyBtn = btn('btn bs bfull', 'Copiar Extrato', function(){
    var NL = '\n';
    var txt = 'LIVRO RAZ\u00C3O' + NL;
    txt += '============' + NL + NL;
    sortedMonths.forEach(function(m){
      var mDate2 = new Date(m+'-15');
      txt += mDate2.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase() + NL;
      byMonth[m].forEach(function(e){
        var sign = e.type==='in' ? '+' : '-';
        var projN = e.proj ? (' [' + (projById(e.proj)||{name:e.proj}).name + ']') : '';
        txt += fDate(e.date) + '  ' + sign + fM(e.amount) + '  ' + e.desc + projN + NL;
        if (e.note) txt += '          ' + e.note + NL;
      });
      var mIn2  = byMonth[m].filter(function(e){return e.type==='in'; }).reduce(function(a,e){return a+e.amount;},0);
      var mOut2 = byMonth[m].filter(function(e){return e.type==='out';}).reduce(function(a,e){return a+e.amount;},0);
      txt += 'Subtotal: +' + fM(mIn2) + ' / -' + fM(mOut2) + NL + NL;
    });
    txt += 'SALDO: ' + (bal>=0?'+':'') + fM(bal);
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(function(){toast('Extrato copiado!');}).catch(function(){fbCopyLz(txt);});
    else fbCopyLz(txt);
    function fbCopyLz(t){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Copiado!');}catch(e){toast('Erro','e');}document.body.removeChild(ta);}
  });
  copyBtn.style.marginTop = '12px';
  main.appendChild(copyBtn);
}

function renderSettings(main) {
  var hdr = div('hdr'); hdr.appendChild(el('h1', null, 'Ajustes')); main.appendChild(hdr);
  var pc = div('card');
  var ph = div(''); ph.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;';
  ph.appendChild(div('ct', 'Projetos'));
  ph.appendChild(btn('btn bp bsm', '+ Novo', function() { openProjectForm(null); }));
  pc.appendChild(ph);
  if (!S.projects.length) {
    pc.appendChild(div('', '<div style="text-align:center;padding:20px 0;color:var(--mu);font-size:14px">Nenhum projeto.</div>'));
  } else {
    S.projects.forEach(function(p) {
      var pi = div('pi');
      var dot = div('pdot'); dot.style.background = p.color || 'var(--ac)';
      var info = div('pinfo');
      var isAct = p.active !== false;
      info.innerHTML = '<div class="pname" style="color:'+(isAct?'var(--tx)':'var(--mu)')+'">' + esc(p.name) + (isAct?'':' <span style="font-size:10px">(inativo)</span>') + '</div>' +
        '<div class="prate">' + fM(p.hourlyRateUsd) + '/h' + (p.category ? '  #' + esc(p.category) : '') + '</div>';
      var acts = div(''); acts.style.cssText = 'display:flex;gap:6px;flex-shrink:0;align-items:center;';
      // Active toggle
      var isActive = p.active !== false;
      var tog = el('button', '', isActive ? 'Ativo' : 'Inativo');
      tog.style.cssText = 'padding:5px 10px;border-radius:20px;border:1px solid '+(isActive?'var(--ac)':'var(--bd)')+';background:'+(isActive?'rgba(0,229,160,.12)':'var(--sf2)')+';color:'+(isActive?'var(--ac)':'var(--mu)')+';font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;';
      (function(proj){ tog.onclick = function() {
        var updated = Object.assign({}, proj, {active: proj.active === false, updatedAt: new Date().toISOString()});
        dbPut('projects', updated).then(reload).then(function(){ toast((updated.active?'Ativo':'Inativo')+': '+proj.name); });
      }; })(p);
      acts.appendChild(tog);
      acts.appendChild(btn('btn bsm bs', 'Editar', function() { openProjectForm(p); }));
      acts.appendChild(btn('btn bsm br', 'Excluir', function() {
        showConfirm({
          title: 'Excluir "' + p.name + '"',
          msg: 'Todos os registros serao apagados.',
          yesL: 'Excluir',
          onYes: function() {
            dbDel('projects', p.id).then(function() { return dbAll('events'); })
              .then(function(es) {
                return Promise.all(es.filter(function(e) { return e.projectId === p.id; })
                  .map(function(e) { return dbDel('events', e.id); }));
              }).then(reload).then(function() { toast('Projeto excluido'); });
          }
        });
      }));
      pi.appendChild(dot); pi.appendChild(info); pi.appendChild(acts); pc.appendChild(pi);
    });
  }
  main.appendChild(pc);

  var dc = div('card'); dc.appendChild(div('ct', 'Dados'));
  var dr2 = div('srow');
  var dl = div('');
  dl.innerHTML = '<div class="slbl">Limpar registros</div><div class="sdesc">Remove eventos. Projetos sao mantidos.</div>';
  dr2.appendChild(dl);
  dr2.appendChild(btn('btn bsm br', 'Limpar', function() {
    showConfirm({
      title: 'Limpar tudo',
      msg: 'Apagar TODOS os eventos?',
      yesL: 'Limpar',
      onYes: function() {
        dbAll('events').then(function(es) {
          return Promise.all(es.map(function(e) { return dbDel('events', e.id); }));
        }).then(reload).then(function() { toast('Registros apagados'); });
      }
    });
  }));
  dc.appendChild(dr2); main.appendChild(dc);

  // GitHub Backup card
  var ghCard = div('card');
  ghCard.appendChild(div('ct', 'Backup GitHub'));

  var ghStatus = div(''); ghStatus.style.cssText = 'font-size:12px;margin-bottom:12px;padding:8px 12px;border-radius:8px;background:var(--sf2);border:1px solid var(--bd);font-family:monospace;';
  function updateGhStatus() {
    if (GH.token && GH.repo) {
      ghStatus.innerHTML = '<span style="color:var(--ac)">\u2713 Conectado</span> &nbsp; ' + esc(GH.repo) + '<br><span style="color:var(--mu);font-size:11px">' + esc(GH.path) + '</span>';
    } else {
      ghStatus.innerHTML = '<span style="color:var(--mu)">N\u00E3o configurado</span>';
    }
  }
  updateGhStatus();
  ghCard.appendChild(ghStatus);

  // Config button
  var cfgBtn = btn('btn bs bfull', '\u2699\uFE0F  Configurar', function() {
    showModal(function(mo, close) {
      mo.appendChild(div('mtit', 'GitHub Backup'));
      mo.appendChild(div('', '<div style="font-size:12px;color:var(--mu);margin-bottom:16px;line-height:1.6">' +
        'Crie um <b style="color:var(--tx)">Personal Access Token</b> em:<br>' +
        '<span style="font-family:monospace;font-size:11px;color:var(--ac)">github.com \u2192 Settings \u2192 Developer settings \u2192 Tokens (classic)</span><br>' +
        'Permiss\u00E3o necess\u00E1ria: <b style="color:var(--tx)">repo</b>' +
        '</div>'));

      var f1 = div('fg'); f1.appendChild(mkLbl('Token'));
      var ti = el('input',''); ti.type='password'; ti.placeholder='ghp_xxxxxxxxxxxx'; ti.value=GH.token;
      f1.appendChild(ti); mo.appendChild(f1);

      var f2 = div('fg'); f2.appendChild(mkLbl('Reposit\u00F3rio (usuario/repo)'));
      var ri = el('input',''); ri.type='text'; ri.placeholder='seuusuario/meu-repo'; ri.value=GH.repo;
      f2.appendChild(ri); mo.appendChild(f2);

      var f3 = div('fg'); f3.appendChild(mkLbl('Caminho do arquivo'));
      var pi = el('input',''); pi.type='text'; pi.placeholder='timetrack-backup.json'; pi.value=GH.path;
      f3.appendChild(pi); mo.appendChild(f3);

      var row = div('brow');
      var cb = btn('btn bs', 'Cancelar', close); cb.style.flex='1';
      var sb = btn('btn bp', 'Salvar', function() {
        GH.token = ti.value.trim();
        GH.repo  = ri.value.trim();
        GH.path  = pi.value.trim() || 'timetrack-backup.json';
        try { localStorage.setItem('tt_gh', JSON.stringify({token:GH.token,repo:GH.repo,path:GH.path})); } catch(e) {}
        updateGhStatus();
        close();
        toast('Configura\u00E7\u00E3o salva');
      }); sb.style.flex='1';
      row.appendChild(cb); row.appendChild(sb); mo.appendChild(row);
    });
  });
  ghCard.appendChild(cfgBtn);

  // Backup now button
  var bkNowBtn = btn('btn bp bfull', '\u2601\uFE0F  Fazer Backup Agora', function() {
    if (!GH.token || !GH.repo) { toast('Configure o GitHub primeiro', 'w'); return; }
    bkNowBtn.textContent = 'Enviando...'; bkNowBtn.disabled = true;
    Promise.all([dbAll('projects'), dbAll('events')]).then(function(r) {
      var json = JSON.stringify({projects:r[0],events:r[1],v:2,at:new Date().toISOString()},null,2);
      var b64 = btoa(unescape(encodeURIComponent(json)));
      var apiUrl = 'https://api.github.com/repos/' + GH.repo + '/contents/' + GH.path;
      // First get current SHA (needed to update existing file)
      fetch(apiUrl, {headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}})
        .then(function(res){ return res.ok ? res.json() : null; })
        .then(function(existing) {
          var body = {message:'TimeTrack backup ' + new Date().toISOString().slice(0,10), content:b64};
          if (existing && existing.sha) body.sha = existing.sha;
          return fetch(apiUrl, {
            method:'PUT',
            headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
            body:JSON.stringify(body)
          });
        })
        .then(function(res) {
          bkNowBtn.textContent = '\u2601\uFE0F  Fazer Backup Agora'; bkNowBtn.disabled = false;
          if (res.ok) { toast('Backup enviado ao GitHub! \u2713'); }
          else { res.json().then(function(e){ toast('Erro: '+(e.message||res.status), 'e', 5000); }); }
        })
        .catch(function(e) {
          bkNowBtn.textContent = '\u2601\uFE0F  Fazer Backup Agora'; bkNowBtn.disabled = false;
          toast('Erro de conex\u00E3o', 'e');
        });
    });
  });
  bkNowBtn.style.marginTop = '10px';
  ghCard.appendChild(bkNowBtn);

  // Restore from GitHub
  var restBtn = btn('btn bs bfull', '\u2B07\uFE0F  Restaurar do GitHub', function() {
    if (!GH.token || !GH.repo) { toast('Configure o GitHub primeiro', 'w'); return; }
    showConfirm({
      title: 'Restaurar do GitHub',
      msg: 'Os dados locais ser\u00E3o substitu\u00EDdos pelo backup do GitHub. Continuar?',
      yesL: 'Restaurar',
      onYes: function() {
        restBtn.textContent = 'Buscando...'; restBtn.disabled = true;
        var apiUrl = 'https://api.github.com/repos/' + GH.repo + '/contents/' + GH.path;
        fetch(apiUrl, {headers:{'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json'}})
          .then(function(res){ return res.json(); })
          .then(function(data) {
            if (!data.content) throw new Error('Arquivo n\u00E3o encontrado');
            var json = decodeURIComponent(escape(atob(data.content.split('\n').join(''))));
            var parsed = JSON.parse(json);
            if (!parsed.projects || !parsed.events) throw new Error('Formato inv\u00E1lido');
            return Promise.all(parsed.projects.map(function(p){ return dbPut('projects',p); }))
              .then(function(){ return Promise.all(parsed.events.map(function(e){ return dbPut('events',e); })); })
              .then(reload)
              .then(function(){ toast('Restaurado do GitHub! \u2713'); });
          })
          .catch(function(e) { toast('Erro: '+e.message, 'e', 5000); })
          .finally(function() { restBtn.textContent = '\u2B07\uFE0F  Restaurar do GitHub'; restBtn.disabled = false; });
      }
    });
  });
  restBtn.style.marginTop = '8px';
  ghCard.appendChild(restBtn);
  main.appendChild(ghCard);

  main.appendChild(div('card',
    '<div class="ct">Sobre</div>' +
    '<div style="font-size:13px;color:var(--mu);line-height:1.9">' +
    '<b style="color:var(--tx)">TimeTrack v7.7</b><br>' +
    '100% local e offline.<br>' +
    'Dados armazenados no seu iPhone.<br><br>' +
    '<span style="font-family:monospace;font-size:11px">IndexedDB \u00B7 Offline-first</span></div>'
  ));
}

function openProjectForm(proj) {
  showModal(function(mo, close) {
    mo.appendChild(div('mtit', proj ? 'Editar Projeto' : 'Novo Projeto'));
    function mkfg(lbtxt) { var f = div('fg'); f.appendChild(mkLbl(lbtxt)); return f; }
    var f1 = mkfg('Nome'); var ni = el('input',''); ni.type='text'; ni.placeholder='ex: Greg, Lia...';
    if (proj) ni.value = proj.name; f1.appendChild(ni); mo.appendChild(f1);
    var f2 = mkfg('Taxa US$/hora'); var ri = el('input',''); ri.type='number'; ri.placeholder='35.00'; ri.step='0.01'; ri.min='0';
    if (proj) ri.value = proj.hourlyRateUsd; f2.appendChild(ri); mo.appendChild(f2);
    var f3 = mkfg('Categoria (opcional)'); var ci = el('input',''); ci.type='text'; ci.placeholder='freelance, cliente...';
    if (proj) ci.value = proj.category || ''; f3.appendChild(ci); mo.appendChild(f3);
    var f4 = mkfg('Cor'); var cw = div('cswrap');
    var selC = proj ? (proj.color || COLORS[0]) : COLORS[S.projects.length % COLORS.length];
    COLORS.forEach(function(c) {
      var sw = div('csw' + (c === selC ? ' on' : '')); sw.style.background = c;
      sw.onclick = function() {
        selC = c;
        cw.querySelectorAll('.csw').forEach(function(x) { x.className = 'csw'; });
        sw.className = 'csw on';
      };
      cw.appendChild(sw);
    });
    f4.appendChild(cw); mo.appendChild(f4);
    var row4 = div('brow');
    var cb3 = btn('btn bs', 'Cancelar', close); cb3.style.flex = '1';
    var sb = btn('btn bp', 'Salvar', function() {
      var nm = ni.value.trim(); if (!nm) { toast('Nome obrigatorio', 'w'); return; }
      var rt = parseFloat(ri.value); if (!rt || rt <= 0) { toast('Taxa invalida', 'w'); return; }
      var now2 = new Date().toISOString();
      dbPut('projects', {
        id: proj ? proj.id : uid(), name: nm, hourlyRateUsd: rt, color: selC,
        category: ci.value.trim(), active: proj ? proj.active !== false : true,
        createdAt: proj ? proj.createdAt : now2, updatedAt: now2
      }).then(reload).then(function() { close(); toast(proj ? 'Projeto atualizado' : 'Projeto "' + nm + '" criado'); });
    }); sb.style.flex = '1';
    row4.appendChild(cb3); row4.appendChild(sb); mo.appendChild(row4);
    setTimeout(function() { ni.focus(); }, 200);
  });
}
